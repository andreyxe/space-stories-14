#Traitor/Nuclear Operative implant

- type: entity
  parent: BaseSubdermalImplant
  id: STAfterburnerImplant
  name: afterburner implant
  description: Injects a limited dose of stimulants into the body.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: STActionActivateAfterburnerImplant
  - type: TriggerOnActivateImplant
  - type: AddSolutionOnTrigger
    addedSolution:
      maxVol: 20
      reagents:
      - ReagentId: Stimulants
        Quantity: 20
    solution: bloodstream
    targetUser: true

#ERT implant

- type: entity
  parent: BaseSubdermalImplant
  id: STAdrenocorImplant
  name: adrenocor implant
  description: Injects a solution of combat stimulants and medical drugs into the body.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: STActionActivateAdrenocorImplant
  - type: TriggerOnActivateImplant
  - type: AddSolutionOnTrigger
    addedSolution:
      maxVol: 30
      reagents:
      - ReagentId: Desoxyephedrine
        Quantity: 15
      - ReagentId: Omnizine
        Quantity: 15
    solution: bloodstream
    targetUser: true